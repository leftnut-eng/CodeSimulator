<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Robot Code Simulator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/9.3.3/blockly.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/9.3.3/python.min.js"></script>
  <link rel="stylesheet" href="style.css">
 
</head>

<body>

  <h1>Robot Code Simulator</h1>

  <div class="sideBySide">
    <div id="blocklyDiv"></div>
    <canvas id="robotCanvas" width="800" height="400"></canvas>
  </div>
  
  <xml id="toolbox" style="display: none">
    <category name="Movement">
      <block type="move_forward"></block>
      <block type="turn_left"></block>
      <block type="turn_right"></block>
    </category>
  </xml>

  <button onclick="generateCode()">Run Code</button>

  <h3>Generated Python Code</h3>
  <pre id="pythonOutput">Waiting...</pre>

  <h3>Simulated Robot Output</h3>
  <div class="simOutputContainer">
    <pre id="simOutput"></pre>
  </div>


  <script>
    window.addEventListener('load', function () {
      Blockly.defineBlocksWithJsonArray([
        {
          "type": "move_forward",
          "message0": "move forward %1 steps",
          "args0": [{ "type": "field_number", "name": "STEPS", "value": 100 }],
          "previousStatement": null,
          "nextStatement": null,
          "colour": 160,
          "tooltip": "Move the robot forward by steps"
        },
        {
          "type": "turn_left",
          "message0": "turn left %1 degrees",
          "args0": [{ "type": "field_number", "name": "DEGREES", "value": 90 }],
          "previousStatement": null,
          "nextStatement": null,
          "colour": 210,
          "tooltip": "Turn the robot left"
        },
        {
          "type": "turn_right",
          "message0": "turn right %1 degrees",
          "args0": [{ "type": "field_number", "name": "DEGREES", "value": 90 }],
          "previousStatement": null,
          "nextStatement": null,
          "colour": 210,
          "tooltip": "Turn the robot right"
        }
      ]);

      window.PythonGenerator = {
        workspaceToCode: function (workspace) {
          let code = '';
          const topBlocks = workspace.getTopBlocks(true);

          for (let block of topBlocks) {
            code += this.blockToCode(block);
          }
          return code;
        },

        blockToCode: function (block) {
          if (!block) return '';

          let code = '';
          const type = block.type;

          if (type === 'move_forward') {
            const steps = block.getFieldValue('STEPS');
            code = `robot.move_forward(${steps})\n`;
          } else if (type === 'turn_left') {
            const degrees = block.getFieldValue('DEGREES');
            code = `robot.turn_left(${degrees})\n`;
          } else if (type === 'turn_right') {
            const degrees = block.getFieldValue('DEGREES');
            code = `robot.turn_right(${degrees})\n`;
          }

          // Handle next block
          const nextBlock = block.getNextBlock();
          if (nextBlock) {
            code += this.blockToCode(nextBlock);
          }

          return code;
        }
      };

      // Initialize workspace AFTER defining blocks
      window.workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox')
      });
    });

    function generateCode() {
      if (!window.workspace) {
        console.error('Workspace not initialized');
        return;
      }

      const code = window.PythonGenerator.workspaceToCode(window.workspace);
      console.log("Generated Code:", code);
      document.getElementById('pythonOutput').textContent = code || "No code generated.";  

      const lines = code.split('\n').filter(line => line.trim() !== '');
      let index = 0;
      robotState = { x: 200, y: 200, angle: 0 }; // reset robot
      drawRobot();
      document.getElementById('simOutput').textContent = 'Running...';

      function executeNextLine() {
        if (index >= lines.length) return;

        const line = lines[index];
        let log = '';

        if (line.includes('move_forward')) {
          const steps = parseInt(line.match(/\d+/)[0]);
          const radians = (robotState.angle * Math.PI) / 180;
          robotState.x += Math.cos(radians) * steps;
          robotState.y += Math.sin(radians) * steps;
          log = `🟢 Move forward ${steps} steps`;
        } else if (line.includes('turn_left')) {
          const degrees = parseInt(line.match(/\d+/)[0]);
          robotState.angle -= degrees;
          log = `↩️ Turn left ${degrees} degrees`;
        } else if (line.includes('turn_right')) {
          const degrees = parseInt(line.match(/\d+/)[0]);
          robotState.angle += degrees;
          log = `↪️ Turn right ${degrees} degrees`;
        }

        drawRobot();
        document.getElementById('simOutput').textContent += '\n' + log;

        index++;
        setTimeout(executeNextLine, 700); // delay between steps
      }

      executeNextLine();
    }

    const canvas = document.getElementById('robotCanvas');
    const ctx = canvas.getContext('2d');
    const robotImg = new Image();
    robotImg.src = 'robot.png';

    let robotState = {
      x: 200,
      y: 200,
      angle: 0
    };

    robotImg.onload = () => drawRobot();

    function drawRobot() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(robotState.x, robotState.y);
      ctx.rotate((robotState.angle * Math.PI) / 180);
      ctx.drawImage(robotImg, -25, -25, 50, 50); // center image
      ctx.restore();
    }

  </script>
</body>

</html>
